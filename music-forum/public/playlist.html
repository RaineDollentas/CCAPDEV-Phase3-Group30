<head>

  <title>Playlist - Discboxd</title>

</head>
<body>

<header>
  <h1>Discboxd</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
    <a href="profile.html">Profile</a>
    <a href="create-post.html">New Review</a>

  <form id="search-form" action="index.html" method="get">

        <path d="M15 18L9 12L15 6" stroke="#14181c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

</main>
