<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Review - Discboxd</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Discboxd</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
    <a href="profile.html">Profile</a>
    <a href="create-post.html">New Review</a>
    <a href="about.html">About</a>
  </nav>


  <form id="search-form" action="index.html" method="get">
    <input type="text" id="search-input" name="search" placeholder="Search reviews...">
  </form>
</header>

<main>
  <h2>Create New Review</h2>

  <form id="new-post-form">
    <label for="post-song">Song / Album (optional)</label>
    <select id="post-song">
      <option value="">-- Select a song to attach review --</option>
    </select>

    <label for="post-title">Review Title</label>
    <input type="text" id="post-title" placeholder="Review title" required>

    <label for="post-rating">Rating</label>
    <select id="post-rating">
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5" selected>5</option>
    </select>

    <label for="post-body">Review</label>
    <textarea id="post-body" placeholder="Write your review..." required></textarea>
    <button type="submit">Post Review</button>
  </form>
</main>

<footer>
  &copy; 2026 Discboxd
</footer>


<script src="js/data.js"></script>
<script src="js/create.js"></script>
<script src="js/nav.js"></script>

</body>
</html>
